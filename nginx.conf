server {
    listen 80;
    server_name bayani.cloud;
    server_tokens off;

    # Location for certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bayani.cloud;
    server_tokens off;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/bayani.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bayani.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # API Proxy
    location /api {
        proxy_pass http://bayani.cloud:9000;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Forwarded-Proto $scheme;  # Add this line to forward the protocol
    }

    # Frontend Proxy
    location / {
        proxy_pass http://bayani.cloud:3000;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Forwarded-Proto $scheme;  # Add this line to forward the protocol
    }

    location /websocket {
        proxy_pass http://bayani.cloud:9000;  # Your WebSocket server
        proxy_http_version 1.1;

        # WebSocket specific headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}