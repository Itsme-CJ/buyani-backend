# --- JPA & Database Configuration ---
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.datasource.url=jdbc:mysql://localhost:3306/bayani?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.liquibase.change-log=classpath:/db/db.changelog-root.yaml

# --- REST & Server ---
spring.data.rest.base-path=api
spring.messages.basename=lang/messages
server.port=9000
server.forward-headers-strategy=native

# --- CORS (mobile app / frontend) ---
cors.allowedOrigins=http://192.168.0.104:3000,http://localhost:3000

# --- Twilio (SMS) ---
twilio.accountSId=YOUR_TWILIO_ACCOUNT_ID
twilio.authId=YOUR_TWILIO_AUTH_ID

# --- JWT Token Expiration (optional) ---
JWT_EXPIRATION_MS=3600000
JWT_REFRESH_EXP_MS=86400000

# --- Mail Server (optional, for email notifications) ---
MAIL_SERVER_HOST=smtp.gmail.com
MAIL_SERVER_PORT=587
MAIL_SERVER_PROTOCOL=smtp
MAIL_SERVER_USERNAME=bayaniapp4@gmail.com
MAIL_SERVER_PASSWORD=YOUR_MAIL_APP_PASSWORD
MAIL_SERVER_FROM=no-reply@bayani.com
MAIL_SERVER_NAME=bayani App

# --- Storage (Digital Ocean Spaces) ---
STORAGE_URL=sgp1.digitaloceanspaces.com
STORAGE_PATH_URL=https://alchives-cdn.sgp1.digitaloceanspaces.com
STORAGE_ACCESS_KEY=YOUR_DO_ACCESS_KEY
STORAGE_SECRET_KEY=YOUR_DO_SECRET_KEY
