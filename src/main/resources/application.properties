# --- JPA & Database Configuration ---
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.liquibase.change-log=classpath:/db/db.changelog-root.yaml

# --- REST & Server ---
spring.data.rest.base-path=api
spring.messages.basename=lang/messages
server.port=${PORT:9000}
server.forward-headers-strategy=native

# fix controller conflict with Spring Data REST
spring.data.rest.detection-strategy=annotated

# --- CORS (mobile app / frontend) ---
cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# --- Twilio (SMS) ---
twilio.accountSId=${TWILIO_ACCOUNT_SID:}
twilio.authId=${TWILIO_AUTH_ID:}

# --- JWT Token Expiration ---
JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:3600000}
JWT_REFRESH_EXP_MS=${JWT_REFRESH_EXP_MS:86400000}

# --- Mail Server ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

mail.server.name=BuyAni App
mail.server.from=${MAIL_USERNAME}
base.url=${BASE_URL:http://localhost:3000}

# --- Storage (Backblaze B2) ---
STORAGE_URL=${STORAGE_URL:}
STORAGE_PATH_URL=${STORAGE_PATH_URL:}
STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:}
STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# HikariCP - prevent stale connections on Neon free tier
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-timeout=30000
